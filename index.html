<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>कार्यप्रबंध</title>

    <link rel="stylesheet" href="style.css" />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>

  <body class="min-h-screen bg-gray-300 overflow-x-hidden whitespace-wrap">
    <!-- Header -->
    <header class="py-3 flex items-center justify-evenly">
      <div class="text-center flex items-center gap-3">
        <h1 class="text-3xl font-bold text-gray-900">कार्य नियोजक</h1>
        <p class="text-sm text-gray-600">Organize your tasks efficiently</p>
      </div>
      <div>
        <a href="./tasks.html"
          ><button
            class="border-none bg-gray-600 hover:bg-gray-950 text-white px-4 py-2 rounded-lg active:scale-95"
          >
            Tasks
          </button></a
        >
      </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col items-center justify-center px-4 gap-10">
      <div class="max-w-5xl bg-white rounded-2xl shadow-xl p-6">
        <h2 class="text-2xl font-semibold text-center mb-5">Create New Task</h2>

        <form class="grid md:grid-cols-2 gap-5">
          <!-- Title -->
          <div>
            <label class="block mb-1 font-medium text-gray-700">
              Task Title
            </label>

            <input
              type="text"
              placeholder="Enter task title"
              class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-gray-500 focus:outline-none focus:border-none"
              id="task-title"
            />
          </div>

          <!-- Category -->
          <div>
            <label class="block mb-1 font-medium text-gray-700">
              Category
            </label>

            <select
              class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-gray-500 focus:outline-none focus:border-none"
            >
              <option class="text-gray-700" selected disabled hidden>
                Select Category
              </option>
              <option>Work</option>
              <option>Personal</option>
              <option>Study</option>
              <option>Shopping</option>
              <option>Finance</option>
              <option>Other</option>
            </select>
          </div>

          <!-- Description -->
          <div class="md:col-span-2">
            <label class="block mb-1 font-medium text-gray-700">
              Task Description
            </label>

            <textarea
              rows="4"
              placeholder="Describe your task..."
              class="w-full px-4 py-2 border rounded-lg resize-none focus:ring-2 focus:ring-gray-500 focus:outline-none focus:border-none"
              id="task-desc"
            ></textarea>
          </div>

          <!-- Priority -->
          <div class="md:col-span-2">
            <label class="block mb-2 font-medium text-gray-700">
              Priority
            </label>

            <div class="grid grid-cols-4 gap-3" id="priorityDiv">
              <label
                class="flex items-center justify-center gap-2 rounded-lg py-2 cursor-pointer hover:bg-blue-50"
              >
                <input type="radio" name="priority" class="accent-blue-500" />
                <span class="text-blue-600">Low</span>
              </label>

              <label
                class="flex items-center justify-center gap-2 rounded-lg py-2 cursor-pointer hover:bg-yellow-50"
              >
                <input type="radio" name="priority" class="accent-yellow-500" />
                <span class="text-yellow-600">Medium</span>
              </label>

              <label
                class="flex items-center justify-center gap-2 rounded-lg py-2 cursor-pointer hover:bg-orange-50"
              >
                <input type="radio" name="priority" class="accent-orange-500" />
                <span class="text-orange-600">High</span>
              </label>

              <label
                class="flex items-center justify-center gap-2 rounded-lg py-2 cursor-pointer hover:bg-red-50"
              >
                <input type="radio" name="priority" class="accent-red-500" />
                <span class="text-red-600">Urgent</span>
              </label>
            </div>
          </div>

          <!-- Button -->
          <div class="md:col-span-2">
            <button
              type="submit"
              class="w-full bg-gray-600 hover:bg-gray-950 text-white font-semibold py-3 rounded-lg active:scale-95 transition"
            >
              Add Task
            </button>
          </div>
        </form>
      </div>

      <div
        class="w-[90vw] grid sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-2 mb-5"
        id="task-container"
        ></div>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
